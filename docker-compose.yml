services:
  api:
    build:
      context: ./backend
    environment:
      ONLY_MEMORIES_DB: /data/only-memories.sqlite3
      ONLY_MEMORIES_HOST: 0.0.0.0
      ONLY_MEMORIES_PORT: 8765
    volumes:
      - only_memories_data:/data
    ports:
      - "8765:8765"

  ui:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8765
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  only_memories_data:
